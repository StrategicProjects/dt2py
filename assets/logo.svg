<svg xmlns="http://www.w3.org/2000/svg" width="520" height="600" viewBox="0 0 200 230.94" role="img" aria-label="dt2 — DataTables v2 for Shiny for Python">
  <title>dt2 — DataTables v2 for Shiny for Python</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.55" y2="1">
      <stop offset="0" stop-color="#5C6BC0"/>
      <stop offset="0.55" stop-color="#3949AB"/>
      <stop offset="1" stop-color="#283593"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#26C6DA"/>
      <stop offset="1" stop-color="#2196F3"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="1.4" stdDeviation="1.6" flood-color="#1A237E" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- hex border -->
  <path d="M100 2.6 L196.5 59.07 L196.5 171.87 L100 228.34 L3.5 171.87 L3.5 59.07 Z"
        fill="#1A237E"/>
  <!-- hex face -->
  <path d="M100 8.5 L191.4 62.0 L191.4 168.94 L100 222.44 L8.6 168.94 L8.6 62.0 Z"
        fill="url(#bg)"/>
  <!-- subtle top sheen -->
  <path d="M100 8.5 L191.4 62.0 L100 115.5 L8.6 62.0 Z" fill="#ffffff" opacity="0.06"/>

  <!-- DataTables card -->
  <g filter="url(#shadow)">
    <rect x="48" y="52" width="104" height="86" rx="8" fill="#FCFDFF"/>
    <!-- header row -->
    <path d="M48 60 a8 8 0 0 1 8 -8 h88 a8 8 0 0 1 8 8 v12 h-104 Z" fill="url(#header)"/>
    <!-- header column ticks -->
    <rect x="58"  y="60.5" width="20" height="3.4" rx="1.7" fill="#ffffff" opacity="0.95"/>
    <rect x="86"  y="60.5" width="20" height="3.4" rx="1.7" fill="#ffffff" opacity="0.95"/>
    <rect x="114" y="60.5" width="20" height="3.4" rx="1.7" fill="#ffffff" opacity="0.95"/>
    <!-- sort caret -->
    <path d="M139 60.4 l3 3.6 l3 -3.6 Z" fill="#ffffff" opacity="0.9"/>

    <!-- body rows -->
    <g fill="#C5CAE9">
      <rect x="58"  y="82"  width="20" height="3.4" rx="1.7"/>
      <rect x="86"  y="82"  width="20" height="3.4" rx="1.7"/>
      <rect x="114" y="82"  width="20" height="3.4" rx="1.7"/>
      <rect x="58"  y="95"  width="20" height="3.4" rx="1.7"/>
      <rect x="86"  y="95"  width="20" height="3.4" rx="1.7"/>
      <rect x="114" y="95"  width="20" height="3.4" rx="1.7"/>
      <rect x="58"  y="108" width="20" height="3.4" rx="1.7"/>
      <rect x="86"  y="108" width="20" height="3.4" rx="1.7"/>
      <rect x="114" y="108" width="20" height="3.4" rx="1.7"/>
    </g>
    <!-- row separators -->
    <g stroke="#E8EAF6" stroke-width="1">
      <line x1="48" y1="89"  x2="152" y2="89"/>
      <line x1="48" y1="102" x2="152" y2="102"/>
      <line x1="48" y1="115" x2="152" y2="115"/>
    </g>
    <!-- highlighted (selected) row -->
    <rect x="48" y="115" width="104" height="13" fill="#3D5AFE" opacity="0.10"/>
    <g fill="#3D5AFE">
      <rect x="58"  y="121" width="20" height="3.4" rx="1.7"/>
      <rect x="86"  y="121" width="20" height="3.4" rx="1.7"/>
      <rect x="114" y="121" width="20" height="3.4" rx="1.7"/>
    </g>
  </g>

  <!-- wordmark -->
  <text x="100" y="178" text-anchor="middle"
        font-family="'DejaVu Sans','Helvetica Neue',Helvetica,Arial,sans-serif"
        font-size="44" font-weight="700" letter-spacing="-1.5" fill="#FFFFFF">dt<tspan fill="#26C6DA">2</tspan></text>
</svg>
