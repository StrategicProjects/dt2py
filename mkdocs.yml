site_name: dt2
site_description: DataTables v2 for Shiny for Python — anywidget binding, Python port of the R DT2 package
site_url: https://strategicprojects.github.io/dt2py/
repo_url: https://github.com/StrategicProjects/dt2py
repo_name: StrategicProjects/dt2py
edit_uri: edit/main/docs/
copyright: Copyright &copy; André Leite — MIT

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - content.code.copy
    - content.code.annotate
    - toc.follow
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: numpy
            members_order: source
            show_root_heading: true
            show_source: true
            show_signature_annotations: true
            separate_signature: true
            heading_level: 3
            filters: ["!^_"]

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: ["."]
      check_paths: true

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Configuring tables: options.md
  - Extensions: extensions.md
  - Server-side processing: server-side.md
  - Proxy & events: proxy-events.md
  - Examples: examples.md
  - API reference: api.md
  - Changelog: changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/StrategicProjects/dt2py
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/dt2/
  # The R package this is a port of:
  r_package: https://github.com/StrategicProjects/DT2
