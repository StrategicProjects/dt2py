name: Docs

# Builds the MkDocs site and publishes it to the gh-pages branch (GitHub Pages).
on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "src/dt2/**"
      - "CHANGELOG.md"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: write # mkdocs gh-deploy pushes to the gh-pages branch

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # gh-deploy needs full history for the gh-pages branch

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs]"

      - name: Build and deploy to gh-pages
        run: mkdocs gh-deploy --force --no-history
